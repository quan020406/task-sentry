# 《先别开工》Nginx 安全响应头片段
#
# P1-2 修复：Nginx 的 add_header 继承规则是「location 一旦出现 add_header，
# 就不再继承 server 级的 add_header」。因此 server 级的安全头会被带 Cache-Control
# 的 location（静态资源、index.html）覆盖。
#
# 解决：把安全头抽成独立片段，server 级与每个含 add_header 的 location 都 include，
# 确保所有响应（首页、静态资源、SPA fallback、健康检查、错误页）都稳定携带安全头。
#
# 用法：在 server 块及每个含 add_header 的 location 内 `include /etc/nginx/conf.d/security-headers.conf;`

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
